name: Build anime knowledge assets

on:
  push:
    branches:
      - feat/anime-knowledge-sky-assets
    paths:
      - .github/workflows/build-anime-knowledge-assets.yml
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-assets:
    runs-on: ubuntu-latest

    steps:
      - name: Check out branch
        uses: actions/checkout@v4
        with:
          ref: feat/anime-knowledge-sky-assets
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install image tooling
        run: python -m pip install --disable-pip-version-check Pillow

      - name: Download original generated compositions
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p .asset-build public/anime-scene
          curl -L --fail --retry 3 --retry-all-errors \
            "https://photoshop-api.adobe.io/v2/short-url/urn:aaid:ps:US:e7f5a2c4-e88f-4404-bfd1-505aaec88928" \
            -o .asset-build/desktop.png
          curl -L --fail --retry 3 --retry-all-errors \
            "https://photoshop-api.adobe.io/v2/short-url/urn:aaid:ps:US:1cf09652-41ca-41ea-9d59-bdbf8309327a" \
            -o .asset-build/tablet.png
          curl -L --fail --retry 3 --retry-all-errors \
            "https://photoshop-api.adobe.io/v2/short-url/urn:aaid:ps:US:da243120-e1ca-4b29-bc7f-0d7b7abd4e89" \
            -o .asset-build/mobile.png

      - name: Produce responsive WebP files
        shell: bash
        run: |
          set -euo pipefail
          python <<'PY'
          from pathlib import Path
          from PIL import Image, ImageOps

          source = Path('.asset-build')
          output = Path('public/anime-scene')
          output.mkdir(parents=True, exist_ok=True)

          def load(name: str) -> Image.Image:
              path = source / name
              image = Image.open(path)
              image.load()
              return image.convert('RGB')

          desktop_source = load('desktop.png')
          tablet_source = load('tablet.png')
          mobile_source = load('mobile.png')

          desktop = ImageOps.fit(
              desktop_source,
              (2560, 1440),
              method=Image.Resampling.LANCZOS,
              centering=(0.5, 0.55),
          )
          tablet = ImageOps.fit(
              tablet_source,
              (2048, 1536),
              method=Image.Resampling.LANCZOS,
              centering=(0.5, 0.56),
          )
          mobile = ImageOps.fit(
              mobile_source,
              (1080, 1920),
              method=Image.Resampling.LANCZOS,
              centering=(0.5, 0.58),
          )

          desktop.save(
              output / 'anime-knowledge-desktop.webp',
              'WEBP', quality=88, method=6,
          )
          tablet.save(
              output / 'anime-knowledge-tablet.webp',
              'WEBP', quality=87, method=6,
          )
          mobile.save(
              output / 'anime-knowledge-mobile.webp',
              'WEBP', quality=86, method=6,
          )
          desktop.resize((64, 36), Image.Resampling.LANCZOS).save(
              output / 'anime-knowledge-placeholder.webp',
              'WEBP', quality=55, method=4,
          )

          expected = {
              'anime-knowledge-desktop.webp': (2560, 1440),
              'anime-knowledge-tablet.webp': (2048, 1536),
              'anime-knowledge-mobile.webp': (1080, 1920),
              'anime-knowledge-placeholder.webp': (64, 36),
          }
          for filename, dimensions in expected.items():
              path = output / filename
              with Image.open(path) as check:
                  if check.size != dimensions or check.format != 'WEBP':
                      raise RuntimeError(
                          f'{filename}: expected WEBP {dimensions}, got {check.format} {check.size}'
                      )
              print(f'{filename}: {path.stat().st_size} bytes')
          PY

      - name: Commit generated assets and remove temporary workflow
        shell: bash
        run: |
          set -euo pipefail
          rm -rf .asset-build
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add public/anime-scene/*.webp
          git rm .github/workflows/build-anime-knowledge-assets.yml
          git commit -m "Add responsive anime knowledge sky assets"
          git push origin HEAD:feat/anime-knowledge-sky-assets
