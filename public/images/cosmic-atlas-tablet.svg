    <ellipse cx="1080" cy="1020" rx="770" ry="215" fill="none" stroke="#d8b06a" stroke-opacity=".14" stroke-width="2" transform="rotate(-23 1080 1020)"/>
    <ellipse cx="1080" cy="1020" rx="1110" ry="340" fill="none" stroke="#8ddfff" stroke-opacity=".075" stroke-width="2" transform="rotate(7 1080 1020)"/>
  </g>
  <circle cx="1080" cy="955" r="300" fill="url(#sphere)"/>
  <circle cx="988" cy="862" r="94" fill="#f7d996" opacity=".13" filter="url(#softGlow)"/>
  <path d="M825 1010c150 132 380 144 535 20" fill="none" stroke="#f6efe4" stroke-opacity=".08" stroke-width="2"/>
  <path d="M870 790c118-94 292-132 452-62" fill="none" stroke="#d8b06a" stroke-opacity=".11" stroke-width="2"/>
