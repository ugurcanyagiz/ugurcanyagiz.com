  </g>
  <g opacity=".22" stroke="#f6efe4" stroke-width="1"><path d="M180 1710 C 520 1460, 790 1540, 1040 1320" fill="none"/><path d="M1380 590 C 1650 360, 1870 390, 2070 260" fill="none"/></g>
