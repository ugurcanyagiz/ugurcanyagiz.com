<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 2160 2160" role="img" aria-label="Abstract tablet cosmic atlas background">
  <defs>
    <radialGradient id="space" cx="50%" cy="42%" r="78%">
      <stop offset="0%" stop-color="#14213b"/>
      <stop offset="42%" stop-color="#070b18"/>
      <stop offset="78%" stop-color="#02040b"/>
      <stop offset="100%" stop-color="#010208"/>
    </radialGradient>
    <radialGradient id="sphere" cx="36%" cy="30%" r="70%">
      <stop offset="0%" stop-color="#f6d893" stop-opacity=".92"/>
      <stop offset="20%" stop-color="#c99d58" stop-opacity=".78"/>
      <stop offset="52%" stop-color="#2a3658" stop-opacity=".9"/>
      <stop offset="86%" stop-color="#060915" stop-opacity=".98"/>
      <stop offset="100%" stop-color="#02040b"/>
    </radialGradient>
    <radialGradient id="halo" cx="50%" cy="45%" r="52%">
      <stop offset="0%" stop-color="#d8b06a" stop-opacity=".38"/>
      <stop offset="40%" stop-color="#d8b06a" stop-opacity=".12"/>
      <stop offset="100%" stop-color="#d8b06a" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="ring" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#f6efe4" stop-opacity="0"/>
      <stop offset="28%" stop-color="#e9c77b" stop-opacity=".44"/>
      <stop offset="62%" stop-color="#f6efe4" stop-opacity=".12"/>
      <stop offset="100%" stop-color="#8ddfff" stop-opacity="0"/>
    </linearGradient>
    <filter id="softGlow" x="-40%" y="-40%" width="180%" height="180%"><feGaussianBlur stdDeviation="16" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
    <filter id="grain"><feTurbulence type="fractalNoise" baseFrequency="0.85" numOctaves="3" stitchTiles="stitch"/><feColorMatrix type="saturate" values="0"/><feComponentTransfer><feFuncA type="table" tableValues="0 .075"/></feComponentTransfer></filter>
  </defs>
  <rect width="2160" height="2160" fill="url(#space)"/>
  <circle cx="1080" cy="940" r="820" fill="url(#halo)" filter="url(#softGlow)"/>
